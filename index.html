<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Multi-Resort Ski Day Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1b2a;
    --navy-mid: #1a2e45;
    --navy-card: #162236;
    --navy-border: #243650;
    --ice: #a8d8ea;
    --ice-dim: #5b9ab5;
    --ice-bright: #d4eef8;
    --snow: #e8f4f8;
    --snow-dim: #b8d4e0;
    --gold: #e8c96a;
    --gold-dim: #c4a040;
    --red: #e86a5a;
    --green: #7ec89a;
    --text-primary: #e8f4f8;
    --text-secondary: #8fafc4;
    --text-muted: #4d7a96;
    --chip-bg: #1e3347;
    --chip-border: #2d4d6a;
    --tag-lift: #1a3a5c;
    --tag-traverse: #2a1a3a;
    --tag-run: #0f2a1a;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: var(--navy-mid);
    border-bottom: 1px solid var(--navy-border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--ice-bright);
    letter-spacing: -0.3px;
  }

  .header-left .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .resort-selector select {
    background: var(--chip-bg);
    border: 1px solid var(--navy-border);
    color: var(--ice);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    outline: none;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s;
  }

  .resort-selector select:focus {
    border-color: var(--ice-dim);
  }

  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: calc(100vh - 75px);
  }

  .sidebar {
    background: var(--navy-card);
    border-right: 1px solid var(--navy-border);
    padding: 24px 20px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 12px;
  }

  .zone-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--ice-dim);
    margin: 16px 0 6px 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid rgba(82, 138, 163, 0.15);
    padding-bottom: 2px;
  }

  .component-group {
    margin-bottom: 24px;
  }

  .component-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .type-pill {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .type-lift { background: var(--tag-lift); color: var(--ice); border: 1px solid #2a5080; }
  .type-traverse { background: var(--tag-traverse); color: #c4a0e8; border: 1px solid #3a2a5a; }
  .type-run { background: var(--tag-run); color: var(--green); border: 1px solid #1a4a2a; }

  .component-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .component-btn {
    width: 100%;
    background: var(--chip-bg);
    border: 1px solid var(--chip-border);
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.15s, border-color 0.15s;
    text-align: left;
  }

  .component-btn:hover {
    background: #243d57;
    border-color: var(--ice-dim);
  }

  .component-btn .name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .component-btn .meta {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    display: flex;
    gap: 8px;
  }

  .component-btn .add-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--chip-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: var(--ice-dim);
    flex-shrink: 0
