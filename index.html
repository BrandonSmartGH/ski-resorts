<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Ski Day Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Chart.js for smooth data visualization rendering -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1b2a;
    --navy-mid: #1a2e45;
    --navy-card: #162236;
    --navy-border: #243650;
    --ice: #a8d8ea;
    --ice-dim: #5b9ab5;
    --ice-bright: #d4eef8;
    --snow: #e8f4f8;
    --snow-dim: #b8d4e0;
    --gold: #e8c96a;
    --gold-dim: #c4a040;
    --red: #e86a5a;
    --green: #7ec89a;
    --text-primary: #e8f4f8;
    --text-secondary: #8fafc4;
    --text-muted: #4d7a96;
    --chip-bg: #1e3347;
    --chip-border: #2d4d6a;
    --tag-lift: #1a3a5c;
    --tag-traverse: #2a1a3a;
    --tag-run: #0f2a1a;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: var(--navy-mid);
    border-bottom: 1px solid var(--navy-border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--ice-bright);
    letter-spacing: -0.3px;
  }

  .header-left .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .resort-selector select {
    background: var(--chip-bg);
    border: 1px solid var(--navy-border);
    color: var(--ice);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    outline: none;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s;
  }

  .resort-selector select:focus {
    border-color: var(--ice-dim);
  }

  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: calc(100vh - 75px);
  }

  .sidebar {
    background: var(--navy-card);
    border-right: 1px solid var(--navy-border);
    padding: 24px 20px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 12px;
  }

  .zone-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--ice-dim);
    margin: 16px 0 6px 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid rgba(82, 138, 163, 0.15);
    padding-bottom: 2px;
  }

  .component-group {
    margin-bottom: 24px;
  }

  .component-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .type-pill {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .type-lift { background: var(--tag-lift); color: var(--ice); border: 1px solid #2a5080; }
  .type-traverse { background: var(--tag-traverse); color: #c4a0e8; border: 1px solid #3a2a5a; }
  .type-run { background: var(--tag-run); color: var(--green); border: 1px solid #1a4a2a; }

  .component-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .component-btn {
    width: 100%;
    background: var(--chip-bg);
    border: 1px solid var(--chip-border);
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.15s, border-color 0.15s;
    text-align: left;
  }

  .component-btn:hover {
    background: #243d57;
    border-color: var(--ice-dim);
  }

  .component-btn .name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .component-btn .meta {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    display: flex;
    gap: 8px;
  }

  .component-btn .add-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--chip-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: var(--ice-dim);
    flex-shrink: 0;
    margin-left: 8px;
    line-height: 1;
  }

  .component-btn:hover .add-icon {
    background: var(--ice-dim);
    color: var(--navy);
    border-color: var(--ice-dim);
  }

  .main {
    display: flex;
    flex-direction: column;
    padding: 24px 28px;
    gap: 20px;
    overflow-y: auto;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .stat-card {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 12px;
    padding: 16px;
  }

  .stat-card .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .stat-card .stat-value {
    font-size: 26px;
    font-weight: 600;
    line-height: 1;
    font-family: 'DM Mono', monospace;
  }

  .stat-card .stat-unit {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 3px;
  }

  .stat-total .stat-value { color: var(--ice-bright); }
  .stat-skiing .stat-value { color: var(--green); }
  .stat-vert .stat-value { color: var(--gold); }
  .stat-dist .stat-value { color: var(--ice-dim); }

  .dashboard-mid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
    align-items: start;
  }

  .visualization-card {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .chart-wrapper {
    position: relative;
    width: 160px;
    height: 160px;
    margin-bottom: 16px;
  }

  .sequence-area {
    flex: 1;
  }

  .sequence-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--navy-border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  .sequence-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-height: 120px;
  }

  .seq-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--chip-bg);
    border: 1px solid var(--chip-border);
    border-radius: 8px;
    padding: 9px 12px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .seq-num {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    min-width: 20px;
  }

  .seq-type-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 8px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .seq-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .seq-meta {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-secondary);
    display: flex;
    gap: 10px;
  }

  .remove-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .remove-btn:hover { color: var(--red); background: rgba(232,106,90,0.12); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    border: 1px dashed var(--navy-border);
    border-radius: 12px;
  }

  .empty-state .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* Custom Scrollbar Styles */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--navy-border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ice-dim); }

  @media (max-width: 950px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .dashboard-mid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>⛷️ Ski Day Calculator</h1>
    <div class="subtitle">Build your sequence · Track your day</div>
  </div>
  <div class="resort-selector">
    <select id="resort-picker" onchange="switchResort(this.value)">
      <option value="alta">Alta Ski Area</option>
      <option value="snowbird">Snowbird</option>
      <option value="snowbasin">Snowbasin</option>
      <option value="jackson">Jackson Hole</option>
      <option value="bachelor">Mt. Bachelor</option>
    </select>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="section-label">Components</div>

    <div class="component-group">
      <div class="component-group-header">
        <span class="type-pill type-lift">🚡 Lifts</span>
      </div>
      <div class="component-list" id="lift-list"></div>
    </div>

    <div class="component-group">
      <div class="component-group-header">
        <span class="type-pill type-traverse">↔ Traverses</span>
      </div>
      <div class="component-list" id="traverse-list"></div>
    </div>

    <div class="component-group">
      <div class="component-group-header">
        <span class="type-pill type-run">▼ Ski Runs</span>
      </div>
      <div class="component-list" id="run-list"></div>
    </div>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card stat-total">
        <div class="stat-label">Total Time</div>
        <div class="stat-value" id="total-time">0</div>
        <div class="stat-unit">minutes</div>
      </div>
      <div class="stat-card stat-skiing">
        <div class="stat-label">Skiing Time</div>
        <div class="stat-value" id="skiing-time">0</div>
        <div class="stat-unit">minutes active descent</div>
      </div>
      <div class="stat-card stat-vert">
        <div class="stat-label">Vertical Feet</div>
        <div class="stat-value" id="total-vert">0</div>
        <div class="stat-unit">ft descended</div>
      </div>
      <div class="stat-card stat-dist">
        <div class="stat-label">Distance</div>
        <div class="stat-value" id="total-dist">0.0</div>
        <div class="stat-unit">miles profile</div>
      </div>
    </div>

    <div class="dashboard-mid">
      <div class="visualization-card">
        <div class="section-label" style="align-self: flex-start; margin-bottom: 16px;">Time Metrics Breakdown</div>
        <div class="chart-wrapper">
          <canvas id="timePieChart"></canvas>
        </div>
      </div>

      <div class="sequence-area">
        <div class="sequence-label-row">
          <div class="section-label" style="margin-bottom:0">Your run sequence</div>
          <button class="clear-btn" onclick="clearAll()">Clear all</button>
        </div>
        <div class="sequence-list" id="sequence-list">
          <!-- Dynamic sequence item injections -->
        </div>
      </div>
    </div>
  </div>
</div>

const DIFF_COLORS = {
  beginner: { bg: '#0a2518', text: '#7ec89a', border: '#1a4a2a' },
  intermediate: { bg: '#1a2c10', text: '#a8d870', border: '#2a4a1a' },

let currentResort = 'alta';
let sequence = [];
let nextId = 1;
let chartInstance = null;

function formatTime(mins) {
  if (mins < 60) return Math.round(mins * 10) / 10;
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}

function switchResort(resortKey) {
  currentResort = resortKey;
  sequence = [];
  renderSidebar();
  renderSequence();
  updateStats();
}

function renderSidebar() {
  const data = RESORTS_DATABASE[currentResort];
  
  // Render Lifts Menu
  document.getElementById('lift-list').innerHTML = data.lifts.map(l => `
    <button class="component-btn" onclick="addItem('lifts','${l.id}')">
      <div>
        <div class="name">${l.name}</div>
        <div class="meta"><span>${l.time} min</span></div>
      </div>
      <div class="add-icon">+</div>
    </button>
  `).join('');

  // Render Traverses Menu
  document.getElementById('traverse-list').innerHTML = data.traverses.map(t => `
    <button class="component-btn" onclick="addItem('traverses','${t.id}')">
      <div>
        <div class="name">${t.name}</div>
        <div class="meta"><span>${t.time} min</span></div>
      </div>
      <div class="add-icon">+</div>
    </button>
  `).join('');

  // Render Runs Partitioned Into Explicit Mountain Sectors
  const zonesMap = {};
  data.runs.forEach(r => {
    if (!zonesMap[r.zone]) zonesMap[r.zone] = [];
    zonesMap[r.zone].push(r);
  });

  let runHtml = '';
  for (const zone in zonesMap) {
    runHtml += `<div class="zone-title">${zone}</div>`;
    runHtml += zonesMap[zone].map(r => {
      const dc = DIFF_COLORS[r.diff] || DIFF_COLORS.intermediate;
      return `
        <button class="component-btn" onclick="addItem('runs','${r.id}')">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
              <span class="name">${r.name}</span>
              <span style="font-size:9px;padding:2px 6px;border-radius:6px;background:${dc.bg};color:${dc.text};border:1px solid ${dc.border};text-transform:uppercase;letter-spacing:0.5px">${r.diff}</span>
            </div>
            <div class="meta">
              <span>${r.time} min</span>
              <span>${r.vert.toLocaleString()} ft</span>
              <span>${r.dist} mi</span>
            </div>
          </div>
          <div class="add-icon">+</div>
        </button>
      `;
    }).join('');
  }
  document.getElementById('run-list').innerHTML = runHtml;
}

function addItem(type, id) {
  const resortData = RESORTS_DATABASE[currentResort];
  const itemData = resortData[type].find(x => x.id === id);
  if (!itemData) return;
  
  sequence.push({ uid: nextId++, type, id, data: itemData });
  renderSequence();
  updateStats();
}

function removeItem(uid) {
  sequence = sequence.filter(s => s.uid !== uid);
  renderSequence();
  updateStats();
}

function clearAll() {
  sequence = [];
  renderSequence();
  updateStats();
}

function renderSequence() {
  const el = document.getElementById('sequence-list');
  if (sequence.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏔️</div>
        <p>Add components sequentially from the left panel<br>to map your tracking logs chronologically.</p>
      </div>`;
    return;
  }

  el.innerHTML = sequence.map((item, i) => {
    const d = item.data;
    let badgeStyle = '';
    let badgeLabel = '';
    
    if (item.type === 'lifts') {
      badgeStyle = 'background:var(--tag-lift);color:var(--ice);border:1px solid #2a5080;';
      badgeLabel = 'Lift';
    } else if (item.type === 'traverses') {
      badgeStyle = 'background:var(--tag-traverse);color:#c4a0e8;border:1px solid #3a2a5a;';
      badgeLabel = 'Traverse';
    } else {
      const dc = DIFF_COLORS[d.diff] || DIFF_COLORS.intermediate;
      badgeStyle = `background:${dc.bg};color:${dc.text};border:1px solid ${dc.border};`;
      badgeLabel = d.diff;
    }

    const metaParts = [`${d.time} min`];
    if (d.vert) metaParts.push(`${d.vert.toLocaleString()} ft`);
    if (d.dist) metaParts.push(`${d.dist} mi`);

    return `
      <div class="seq-item">
        <span class="seq-num">${String(i+1).padStart(2,'0')}</span>
        <span class="seq-type-badge" style="${badgeStyle}">${badgeLabel}</span>
        <span class="seq-name">${d.name}</span>
        <div class="seq-meta">${metaParts.map(m => `<span>${m}</span>`).join('')}</div>
        <button class="remove-btn" onclick="removeItem(${item.uid})" title="Remove">×</button>
      </div>`;
  }).join('');
}

function initPieChart() {
  const ctx = document.getElementById('timePieChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Skiing Time', 'Transit / Lifts / Traverses'],
      datasets: [{
        data: [0, 100],
        backgroundColor: ['#7ec89a', '#2d4d6a'],
        borderColor: '#162236',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#8fafc4',
            font: { size: 11, family: 'Inter' },
            boxWidth: 12
          }
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              return ` ${context.label}: ${context.raw} min`;
            }
          }
        }
      },
      cutout: '65%'
    }
  });
}

function updateStats() {
  let totalTime = 0, skiingTime = 0, nonSkiingTime = 0;
  let totalVert = 0, totalDist = 0;

  for (const item of sequence) {
    const d = item.data;
    totalTime += d.time;
    
    if (item.type === 'runs') {
      skiingTime += d.time;
      totalVert += d.vert || 0;
      totalDist += d.dist || 0;
    } else {
      nonSkiingTime += d.time;
    }
  }

  document.getElementById('total-time').textContent = formatTime(totalTime);
  document.getElementById('skiing-time').textContent = formatTime(skiingTime);
  document.getElementById('total-vert').textContent = totalVert.toLocaleString();
  document.getElementById('total-dist').textContent = totalDist.toFixed(1);

  // Sync state cleanly with structural UI variables
  if (chartInstance) {
    if (totalTime === 0) {
      chartInstance.data.datasets[0].data = [0, 100];
    } else {
      chartInstance.data.datasets[0].data = [Math.round(skiingTime), Math.round(nonSkiingTime)];
    }
    chartInstance.update();
  }
}

// Global runtime execution seeds
window.addEventListener('DOMContentLoaded', () => {
  renderSidebar();
  renderSequence();
  initPieChart();
  updateStats();
});
</script>
</body>
</html>
